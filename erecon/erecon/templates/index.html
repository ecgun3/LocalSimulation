<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERecon Web</title>
  <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:2rem;color:#222}.container{max-width:800px;margin:0 auto}h1{font-size:1.6rem;margin-bottom:1rem}form{display:grid;gap:.75rem}label{font-weight:600}input[type=text]{padding:.5rem .6rem;border:1px solid #ccc;border-radius:6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}.actions{margin-top:.5rem}button{background:#0d6efd;color:#fff;border:0;padding:.6rem .9rem;border-radius:6px;cursor:pointer}.muted{color:#666;font-size:.9rem}.error{color:#b00020;margin-bottom:.5rem}</style>
</head>
<body>
  <div class="container">
    <h1>ERecon Web</h1>
    <p class="muted">Domain veya e‑posta girin. İsteğe bağlı ad/soyad ile e‑posta kalıpları üretilir.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/run">
      <label for="domain">Domain</label>
      <input type="text" id="domain" name="domain" placeholder="example.com">
      <label for="email">E‑posta</label>
      <input type="text" id="email" name="email" placeholder="alice@example.com">
      <div class="row">
        <div><label for="first">Ad</label><input type="text" id="first" name="first" placeholder="Alice"></div>
        <div><label for="last">Soyad</label><input type="text" id="last" name="last" placeholder="Doe"></div>
      </div>
      <div class="actions"><button type="submit">Çalıştır</button></div>
    </form>
  </div>
</body>
</html>
